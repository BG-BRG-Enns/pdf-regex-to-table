name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run at 00:19, 08:19, and 16:19 UTC
    - cron: '19 0,8,16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/cron@5ed389108eab8ee3ec9a1ce78f91405fcd13f166 # v1.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
